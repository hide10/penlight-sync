<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Penlight Sync</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100svh;
        background: #000;
        overflow: hidden;
        transition: background-color 0.05s ease;
      }
      #loading {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        color: #aaa; font-family: system-ui, sans-serif; font-size: 1rem;
      }
      #error {
        display: none;
        position: fixed; inset: 0;
        align-items: center; justify-content: center;
        color: #f88; font-family: system-ui, sans-serif;
        padding: 2rem; text-align: center;
      }
      #torch-btn {
        display: none;
        position: fixed;
        bottom: 1.5rem; right: 1.5rem;
        padding: 0.6rem 1.1rem;
        font-size: 0.8rem;
        background: rgba(255,255,255,0.15);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 999px;
        cursor: pointer;
        backdrop-filter: blur(4px);
        -webkit-tap-highlight-color: transparent;
      }
      #torch-btn[data-active='true'] {
        background: rgba(255,220,0,0.3);
        border-color: rgba(255,220,0,0.6);
      }
    </style>
  </head>
  <body>
    <div id="loading">読み込み中...</div>
    <div id="error"></div>
    <button id="torch-btn">フラッシュ</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
